name: CI

on:
  pull_request:
  push:
    branches: [main, develop]

concurrency:
  group: ci-${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  php:
    name: PHP ${{ matrix.php }}
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        php: ['7.4', '8.0', '8.1', '8.2', '8.3']

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup PHP
        uses: shivammathur/setup-php@v2
        with:
          php-version: ${{ matrix.php }}
          extensions: mbstring, json, openssl
          coverage: none
          tools: composer:v2

      - name: Cache Composer
        uses: actions/cache@v4
        with:
          path: ~/.cache/composer
          key: composer-${{ runner.os }}-${{ matrix.php }}-${{ hashFiles('composer.json') }}
          restore-keys: |
            composer-${{ runner.os }}-${{ matrix.php }}-

      - name: Install Composer dependencies
        run: composer install --prefer-dist --no-progress --no-interaction

      - name: Lint (PHPCS / WPCS)
        run: composer run lint

      - name: Test (PHPUnit)
        run: composer run test

  js:
    name: JavaScript / TypeScript
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm

      # `npm install` (not `npm ci`) until package-lock.json is generated and
      # committed. Switch to `npm ci` once the lockfile exists for reproducible
      # builds.
      - name: Install npm dependencies
        run: npm install --no-audit --no-fund

      - name: Lint (ESLint)
        run: npm run lint

      - name: Typecheck (tsc)
        run: npm run typecheck

      - name: Test (Vitest)
        run: npm test

      - name: Build (Vite)
        run: npm run build
